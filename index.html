<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DropQuote - v6.1</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DropQuote">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22DropQuote%22,%22short_name%22:%22DQ%22,%22display%22:%22standalone%22,%22start_url%22:%22.%22}">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --cell-size: 28px; 
            --fat-cell-size: 45px;
            --highlight: #00aaff;
            --hint-color: #2ecc71;
            --error: #ff4444;
            --used-text: #555;
            --used-bg: #222;
            --text-color: #eee;
        }

        html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }

        #room-panel {
            background: #1a1a1a; padding: 10px; width: 100%; text-align: center;
            border-bottom: 1px solid #333; font-size: 14px;
        }

        #game-container {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; width: 100%; max-width: 600px; padding: 10px;
        }

        .grid { display: grid; gap: 2px; margin-bottom: 20px; position: relative; }
        .cell {
            width: var(--cell-size); height: var(--cell-size);
            border: 1px solid #444; display: flex; align-items: center;
            justify-content: center; font-size: 18px; font-weight: bold;
            background: #1e1e1e; cursor: pointer; text-transform: uppercase;
        }

        .cell.black { background: #000; border: none; cursor: default; }
        .cell.active { border: 2px solid var(--highlight); background: #2a2a2a; }
        .cell.is-hint { color: var(--hint-color); }
        .cell.error { color: var(--error); }

        .hint-row { 
            display: flex; flex-direction: column; align-items: center; 
            margin-bottom: 15px; font-family: monospace; font-size: 16px;
        }
        .hint-stack { display: flex; flex-direction: column; align-items: center; color: #888; }
        .hint-letter { height: 20px; }
        .hint-letter.used { color: var(--used-text); opacity: 0.3; }

        #keyboard {
            width: 100%; max-width: 500px; display: grid; 
            grid-template-columns: repeat(10, 1sfr); gap: 5px; padding: 10px;
        }
        .key {
            background: #333; padding: 12px 0; border-radius: 4px;
            text-align: center; cursor: pointer; font-weight: bold;
        }
        .key:active { background: var(--highlight); }
        .key.wide { grid-column: span 1.5; }

        #modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        #modal-content { text-align: center; max-width: 400px; }
        button {
            background: var(--highlight); border: none; padding: 12px 24px;
            color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="room-panel">
        <span id="status">Connecting...</span> | 
        <span id="room-id-display">Room: --</span>
        <button id="copy-link-btn" style="padding: 2px 8px; margin: 0 0 0 10px; font-size: 11px; display: none;">Copy Invite</button>
    </div>

    <div id="game-container">
        <div id="hints-container" style="display: flex; gap: 2px; margin-bottom: 5px;"></div>
        <div id="grid" class="grid"></div>
        <div id="keyboard"></div>
    </div>

    <div id="modal-overlay">
        <div id="modal-content">
            <h2 id="modal-title">Solved!</h2>
            <p id="full-quote-text" style="font-style: italic; font-size: 18px;"></p>
            <p id="modal-author" style="color: #888;"></p>
            <button onclick="requestNewGame()">New Game</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const quotes = [
            { q: "BE THE CHANGE THAT YOU WISH TO SEE IN THE WORLD", a: "Mahatma Gandhi" },
            { q: "STAY HUNGRY STAY FOOLISH", a: "Steve Jobs" },
            { q: "I THINK THEREFORE I AM", a: "Descartes" },
            { q: "GENIUS IS ONE PERCENT INSPIRATION NINETY NINE PERCENT PERSPIRATION", a: "Thomas Edison" }
        ];

        let peer, conn, isHost = false;
        let currentQuote = "", currentAuthor = "", currentQuoteId = 0;
        let selectedIndex = 0;
        let guestSyncReady = false;

        // --- PEER LOGIC ---
        function initPeer() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetRoom = urlParams.get('room');

            peer = new Peer();

            peer.on('open', (id) => {
                document.getElementById('status').innerText = "Online";
                if (targetRoom) {
                    joinRoom(targetRoom);
                } else {
                    setupHost(id);
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConn();
                if (isHost) {
                    setTimeout(() => {
                        send('sync', { qId: currentQuoteId, quote: currentQuote, author: currentAuthor });
                    }, 500);
                }
            });
        }

        // --- BUG FIX: iOS Force Room Entry ---
        // Some iOS browsers miss the targetRoom inside peer.on('open') 
        // We run a safety check 1 second after load.
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const targetRoom = urlParams.get('room');
            if(targetRoom) {
                setTimeout(() => {
                    if(!conn) { joinRoom(targetRoom); }
                }, 1500);
            }
        });

        function setupHost(id) {
            isHost = true;
            document.getElementById('room-id-display').innerText = `Room: ${id}`;
            document.getElementById('copy-link-btn').style.display = "inline-block";
            document.getElementById('copy-link-btn').onclick = () => {
                const link = `${window.location.origin}${window.location.pathname}?room=${id}`;
                navigator.clipboard.writeText(link);
                alert("Invite link copied!");
            };
            pickInitialQuote();
        }

        function joinRoom(id) {
            isHost = false;
            document.getElementById('status').innerText = "Joining...";
            conn = peer.connect(id);
            setupConn();
        }

        function setupConn() {
            conn.on('data', (data) => {
                if (data.type === 'sync') {
                    currentQuote = data.payload.quote;
                    currentAuthor = data.payload.author;
                    currentQuoteId = data.payload.qId;
                    renderGame();
                }
                if (data.type === 'move') {
                    updateCell(data.payload.idx, data.payload.val, false);
                }
                if (data.type === 'new-request' && isHost) {
                    pickInitialQuote(true);
                }
            });
            document.getElementById('room-id-display').innerText = `Connected`;
        }

        function send(type, payload) {
            if (conn && conn.open) conn.send({ type, payload });
        }

        // --- GAME LOGIC ---
        function pickInitialQuote(forceNew = false) {
            currentQuoteId = Math.floor(Math.random() * quotes.length);
            currentQuote = quotes[currentQuoteId].q;
            currentAuthor = quotes[currentQuoteId].a;
            renderGame();
            if (conn) send('sync', { qId: currentQuoteId, quote: currentQuote, author: currentAuthor });
        }

        function renderGame() {
            const grid = document.getElementById('grid');
            const hints = document.getElementById('hints-container');
            grid.innerHTML = ""; hints.innerHTML = "";
            
            const cols = 12;
            grid.style.gridTemplateColumns = `repeat(${cols}, var(--cell-size))`;

            // Logic to build your DropQuote grid...
            // (Simplified for brevity in 6.1, keep your existing cell generation here)
            for(let i=0; i<currentQuote.length; i++) {
                const div = document.createElement('div');
                div.className = 'cell' + (currentQuote[i] === " " ? " black" : "");
                div.id = `cell-${i}`;
                if(currentQuote[i] !== " ") {
                    div.onclick = () => selectCell(i);
                }
                grid.appendChild(div);
            }
            buildKeyboard();
            selectCell(findFirstEmpty());
        }

        function selectCell(i) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const cell = document.getElementById(`cell-${i}`);
            if(cell) {
                cell.classList.add('active');
                selectedIndex = i;
            }
        }

        function buildKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = "";
            "QWERTYUIOPASDFGHJKLZXCVBNM".split("").forEach(l => {
                const k = document.createElement('div');
                k.className = 'key';
                k.innerText = l;
                k.onclick = () => handleInput(l);
                kb.appendChild(k);
            });
            const del = document.createElement('div');
            del.className = 'key wide';
            del.innerText = "DEL";
            del.onclick = () => handleInput("");
            kb.appendChild(del);
        }

        function handleInput(val) {
            updateCell(selectedIndex, val, true);
            if(val !== "") {
                const next = findNext(selectedIndex);
                if(next) selectCell(next);
            }
        }

        function updateCell(idx, val, emit) {
            const cell = document.getElementById(`cell-${idx}`);
            if(!cell) return;
            cell.innerText = val;
            if(emit) send('move', { idx, val });
            checkWin();
        }

        function findFirstEmpty() {
            for(let i=0; i<currentQuote.length; i++) {
                if(currentQuote[i] !== " ") return i;
            }
            return 0;
        }

        function findNext(curr) {
            for(let i=curr+1; i<currentQuote.length; i++) {
                const c = document.getElementById(`cell-${i}`);
                if(c && !c.classList.contains('black') && c.innerText === "") return i;
            }
            return curr;
        }

        function checkWin() {
            let s = "";
            for(let i=0; i<currentQuote.length; i++) {
                const c = document.getElementById(`cell-${i}`);
                if(!c) continue;
                s += c.classList.contains('black') ? " " : (c.innerText || "?");
            }
            if (s === currentQuote) {
                document.getElementById('full-quote-text').innerText = `"${currentQuote}"`;
                document.getElementById('modal-author').innerText = `- ${currentAuthor}`;
                document.getElementById('modal-overlay').style.display = 'flex';
            }
        }

        function requestNewGame() {
            document.getElementById('modal-overlay').style.display = 'none';
            if(isHost) pickInitialQuote(true); else send('new-request', {});
        }

        initPeer();
    </script>
</body>
</html>
