<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DropQuote - v6.7</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DropQuote">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22DropQuote%22,%22short_name%22:%22DQ%22,%22display%22:%22standalone%22,%22start_url%22:%22.%22,%22background_color%22:%22%230b0b0b%22,%22theme_color%22:%22%2300aaff%22}">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --cell-size: 28px; 
            --fat-cell-size: 45px;
            --highlight: #00aaff;
            --hint-color: #2ecc71;
            --error: #ff4444;
            --used-text: #555;
            --used-bg: #222;
            --text-color: #eee;
            --punct-bg: #bbb;
        }

        html, body { 
            height: 100%; 
            min-height: 100dvh; 
            overflow: hidden; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }

        input { 
            user-select: text !important; 
            -webkit-user-select: text !important; 
            background: #000; 
            color: #fff; 
            border: 1px solid #555; 
            padding: 12px; 
            border-radius: 4px; 
            font-size: 18px; 
            width: 85%; 
            margin-bottom: 15px; 
            text-align: center; 
            outline: none; 
            -webkit-appearance: none;
        }

        #room-panel {
            background: #1a1a1a; padding: 25px; border-radius: 12px; margin-top: 50px;
            border: 2px solid var(--highlight); width: 90%; max-width: 350px; text-align: center;
        }
        
        .btn-join { background: var(--highlight); color: white; border: none; padding: 12px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }

        #game-ui { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }

        .p2p-panel {
            background: #1a1a1a; padding: 6px 12px; border-radius: 8px; border: 1px solid #333;
            width: 336px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; margin-top: 5px;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; background: #555; }
        .status-linked { background: var(--highlight); box-shadow: 0 0 8px var(--highlight); }

        .letters-bank { display: grid; grid-template-columns: repeat(12, 1fr); background: #1a1a1a; border: 1px solid #333; width: 336px; margin-top: 2px; }
        .column { display: flex; flex-direction: column; width: var(--cell-size); border-right: 1px solid #333; }
        .column.active-col { background: rgba(0, 170, 255, 0.15); }
        .letter-tile { height: 34px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.1em; border-bottom: 1px solid #222; cursor: pointer; }
        
        .used { color: var(--used-text) !important; background: var(--used-bg); }
        .overused { color: var(--error) !important; background: rgba(255,0,0,0.1); }

        .fat-finger-bar { 
            display: flex; justify-content: center; gap: 4px; background: #222; 
            padding: 6px; width: 336px; min-height: 55px; 
            border-top: 2px solid var(--highlight); border-bottom: 1px solid #444; 
            flex-wrap: wrap; box-sizing: border-box; 
        }
        .fat-tile { width: var(--fat-cell-size); height: var(--fat-cell-size); background: #eee; color: #000; display: flex; justify-content: center; align-items: center; font-size: 1.4em; font-weight: bold; border-radius: 6px; cursor: pointer; }

        .quote-grid { display: grid; grid-template-columns: repeat(12, var(--cell-size)); gap: 1px; background: #333; padding: 2px; border: 1px solid #444; width: 336px; box-sizing: border-box; margin-bottom: 10px; }
        .cell { width: var(--cell-size); height: var(--cell-size); background: #fff; color: #000; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1em; cursor: pointer; }
        .cell.black { background: #000; color: #fff; cursor: pointer; }
        .cell.static { background: var(--punct-bg); color: #000; cursor: pointer; }
        .cell.selected { background: var(--highlight) !important; color: white; }
        .cell.is-hint { color: var(--hint-color) !important; font-weight: 900; }

        .controls { display: flex; gap: 8px; width: 100%; justify-content: center; padding-bottom: 10px; }
        .btn { padding: 12px 18px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; min-width: 85px; }
        .btn-skip { background: #c0392b; }
        .btn-hint { background: #f39c12; }
        .btn-back { background: #555; }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #fff; color: #000; padding: 25px; border-radius: 12px; text-align: center; width: 85%; }
    </style>
</head>
<body>

    <div id="room-panel">
        <h2 style="color:var(--highlight); margin:0 0 10px 0;">DROPQUOTE v6.7</h2>
        <input type="text" id="room-id-input" placeholder="Room Name" autocomplete="off" inputmode="text" enterkeyhint="go">
        <button id="join-btn" class="btn-join" onclick="joinRoom()">Enter Game</button>
    </div>

    <div id="game-ui">
        <div class="p2p-panel">
            <div><span id="dot" class="status-dot"></span> <span id="p2p-status">Wait...</span></div>
            <div id="room-name-display" style="color:var(--highlight); font-weight: bold;">---</div>
        </div>
        <div id="author-name" style="font-weight:bold; margin: 6px 0; font-size: 1.1em;">...</div>

        <div id="lettersBank" class="letters-bank"></div>
        <div id="fatFingerBar" class="fat-finger-bar"></div>
        <div id="quoteGrid" class="quote-grid"></div>
        
        <div class="controls">
            <button class="btn btn-skip" onclick="handleSkipSync()">SKIP</button>
            <button class="btn btn-hint" onclick="handleHintSync()">HINT</button>
            <button class="btn btn-back" onclick="handleBackspaceSync()">BACK</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <p id="full-quote-text" style="font-size: 1.2em; font-weight: bold; margin-bottom: 10px;"></p>
            <h3 id="modal-author" style="color:#666; margin-bottom: 20px;"></h3>
            <button onclick="requestNewGame()" style="background:var(--highlight); padding:15px 30px; border:none; color:#fff; border-radius:8px; font-weight:bold; font-size: 1.1em;">Next Quote</button>
        </div>
    </div>

    <script>
        const QUOTE_SOURCE_URL = 'https://raw.githubusercontent.com/Zachary-747/DQ/refs/heads/main/quotes.json?v=' + Date.now();
        // New version prefix to avoid stale connection IDs
        const VERSION_PREFIX = "dq-v67-room-";
        
        // Explicit STUN servers for better cross-platform (Android/iOS) discovery
        const PEER_CONFIG = {
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' },
                    { url: 'stun:stun2.l.google.com:19302' }
                ]
            }
        };

        let lastRoomName = "", quotesPool = [], peer, conn, selectedIdx = null, currentQuote = "", currentAuthor = "", currentQuoteId = null, currentLang = "en";
        let bankLetters = Array.from({ length: 12 }, () => []), isHost = false;

        async function loadQuotes() {
            try { const r = await fetch(QUOTE_SOURCE_URL); quotesPool = await r.json(); return true; } 
            catch (e) { return false; }
        }

        function joinRoom() {
            const val = document.getElementById('room-id-input').value.trim().toLowerCase();
            if(!val) return;
            lastRoomName = val;
            document.getElementById('join-btn').innerText = "Connecting...";
            loadQuotes().then((success) => {
                if(!success) { alert("Failed to load quotes."); document.getElementById('join-btn').innerText = "Enter Game"; return; }
                document.getElementById('room-panel').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                document.getElementById('room-name-display').innerText = val.toUpperCase();
                initPeer(val);
            });
        }

        function initPeer(roomName) {
            const hostId = VERSION_PREFIX + roomName;
            if (peer) { try { peer.destroy(); } catch(e){} }
            
            peer = new Peer(hostId, PEER_CONFIG);
            let hasOpened = false;
            const timeout = setTimeout(() => { if (!hasOpened) joinAsGuest(hostId); }, 2000);

            peer.on('open', () => { 
                hasOpened = true; clearTimeout(timeout);
                isHost = true; updateStatus("Hosting", "status-online"); 
                if(!currentQuote) pickInitialQuote(); 
            });
            
            peer.on('error', (err) => { 
                console.log("Peer Error:", err.type);
                if (err.type === 'unavailable-id' || err.type === 'id-taken') { 
                    clearTimeout(timeout); 
                    joinAsGuest(hostId); 
                } 
            });
            
            peer.on('connection', (i) => { conn = i; setupConn(); });
        }

        function joinAsGuest(hostId) {
            isHost = false;
            if (peer && !peer.destroyed) { try { peer.destroy(); } catch(e){} }
            peer = new Peer(PEER_CONFIG);
            peer.on('open', () => { 
                updateStatus("Connecting...", "status-online");
                conn = peer.connect(hostId, { reliable: true }); 
                setupConn(); 
            });
        }

        function setupConn() {
            conn.on('open', () => { 
                updateStatus("Linked!", "status-linked"); 
                if(!isHost) send('guest-ready', {}); 
            });
            conn.on('data', (d) => {
                if(d.type === 'guest-ready' && isHost) {
                    const board = [];
                    for(let i=0; i<84; i++) {
                        const c = document.getElementById(`cell-${i}`);
                        board.push({ text: c?c.innerText:"", isHint: c?c.classList.contains('is-hint'):false });
                    }
                    send('init-game', {quote: currentQuote, author: currentAuthor, id: currentQuoteId, lang: currentLang, board: board});
                }
                if(d.type === 'init-game') initGame(d.payload);
                if(d.type === 'fill') applyFill(d.payload.letter, d.payload.idx, false);
                if(d.type === 'back') applyBack(d.payload.idx, false);
                if(d.type === 'hint') applyHint(d.payload.idx, d.payload.char);
                if(d.type === 'skip') applySkip(false);
                if(d.type === 'select') applySelection(d.payload.idx);
                if(d.type === 'new-request') { if(isHost) pickInitialQuote(true); }
            });
            conn.on('close', () => updateStatus("Disconnected", "status-dot"));
        }

        function updateStatus(txt, cls) {
            document.getElementById('p2p-status').innerText = txt;
            document.getElementById('dot').className = "status-dot " + cls;
        }

        function send(type, payload) { if(conn && conn.open) conn.send({type, payload}); }

        function pickInitialQuote(broadcast = false) {
            const history = JSON.parse(localStorage.getItem('dq_history_v3') || '[]');
            const usedIds = history.map(h => h.id);
            const avail = quotesPool.filter(q => !usedIds.includes(q.id));
            const sel = avail.length > 0 ? avail[Math.floor(Math.random()*avail.length)] : quotesPool[Math.floor(Math.random()*quotesPool.length)];
            const gd = {quote: sel.quote.toUpperCase(), author: sel.author, id: sel.id, lang: sel.language};
            initGame(gd);
            if(broadcast) send('init-game', gd);
        }

        function initGame(data) {
            currentQuote = data.quote; currentAuthor = data.author; currentQuoteId = data.id; currentLang = data.lang || "en";
            const authEl = document.getElementById('author-name');
            authEl.innerText = currentAuthor;
            authEl.style.color = (currentLang === 'fr') ? 'var(--hint-color)' : 'var(--highlight)';

            bankLetters = Array.from({ length: 12 }, () => []);
            const grid = document.getElementById('quoteGrid');
            grid.innerHTML = "";
            document.getElementById('modal-overlay').style.display = 'none';

            for (let i = 0; i < 84; i++) {
                const cell = document.createElement('div');
                cell.id = `cell-${i}`;
                const char = currentQuote[i] || ' ';
                
                if (i >= currentQuote.length || char === ' ') {
                    cell.className = 'cell black';
                    cell.onclick = () => jumpToPlayable(i);
                } else if (/[^A-Z]/.test(char)) {
                    cell.className = 'cell static';
                    cell.innerText = char;
                    cell.onclick = () => jumpToPlayable(i);
                } else {
                    cell.className = 'cell';
                    cell.onclick = () => { applySelection(i); send('select', {idx: i}); };
                    bankLetters[i % 12].push(char);
                }
                if (data.board && data.board[i]) {
                    if (data.board[i].text) cell.innerText = data.board[i].text;
                    if (data.board[i].isHint) cell.classList.add('is-hint');
                }
                grid.appendChild(cell);
            }
            bankLetters.forEach(col => col.sort());
            renderBank();
            let start = findNextPlayable(-1);
            if(start !== null) applySelection(start);
        }

        function jumpToPlayable(i) {
            let n = findNextPlayable(i - 1);
            if (n !== null) { applySelection(n); send('select', {idx: n}); }
        }

        function renderBank() {
            const bank = document.getElementById('lettersBank');
            bank.innerHTML = "";
            bankLetters.forEach((col, colIdx) => {
                const colDiv = document.createElement('div');
                colDiv.className = 'column' + (selectedIdx !== null && selectedIdx % 12 === colIdx ? ' active-col' : '');
                let state = getColState(colIdx);
                let tempCounts = {...state.counts};
                col.forEach(l => {
                    const tile = document.createElement('div');
                    tile.className = 'letter-tile';
                    if (tempCounts[l] > 0) { 
                        tile.className += (state.counts[l] > state.available[l]) ? ' overused' : ' used'; 
                        tempCounts[l]--; 
                    }
                    tile.innerText = l;
                    tile.onclick = () => handleInputFromCol(l, colIdx);
                    colDiv.appendChild(tile);
                });
                bank.appendChild(colDiv);
            });
            updateFatFinger();
        }

        function getColState(colIdx) {
            let cells = Array.from(document.querySelectorAll('.cell:not(.black):not(.static)'));
            let used = cells.filter(c => (parseInt(c.id.split('-')[1]) % 12 === colIdx) && c.innerText !== "").map(c => c.innerText);
            let counts = {}; used.forEach(l => counts[l] = (counts[l] || 0) + 1);
            let available = {}; bankLetters[colIdx].forEach(l => available[l] = (available[l] || 0) + 1);
            return { counts, available };
        }

        function updateFatFinger() {
            const bar = document.getElementById('fatFingerBar');
            bar.innerHTML = "";
            if (selectedIdx === null) return;
            const colIdx = selectedIdx % 12;
            let state = getColState(colIdx);
            let tempCounts = {...state.counts};
            bankLetters[colIdx].forEach(l => {
                const b = document.createElement('div');
                b.className = 'fat-tile'; 
                if (tempCounts[l] > 0) { b.className += (state.counts[l] > state.available[l]) ? ' overused' : ' used'; tempCounts[l]--; }
                b.innerText = l;
                b.onclick = () => handleInputFromCol(l, colIdx);
                bar.appendChild(b);
            });
        }

        function handleInputFromCol(letter, colIdx) {
            let targetIdx = selectedIdx;
            if (selectedIdx === null || (selectedIdx % 12 !== colIdx)) targetIdx = findFirstEmptyInCol(colIdx);
            if (targetIdx !== null) { applySelection(targetIdx); send('select', {idx: targetIdx}); applyFill(letter, targetIdx, true); }
        }

        function findFirstEmptyInCol(colIdx) {
            for (let r = 0; r < 7; r++) {
                let idx = r * 12 + colIdx;
                const cell = document.getElementById(`cell-${idx}`);
                if (cell && cell.className === 'cell' && !cell.classList.contains('is-hint') && cell.innerText === "") return idx;
            }
            return null;
        }

        function applySelection(i) {
            const cell = document.getElementById(`cell-${i}`);
            if (!cell || cell.classList.contains('black') || cell.classList.contains('static') || cell.classList.contains('is-hint')) return;
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
            selectedIdx = i; cell.classList.add('selected'); renderBank();
        }

        function applyFill(l, i, notify) {
            const cell = document.getElementById(`cell-${i}`);
            if(!cell) return;
            cell.innerText = l;
            if(notify) { send('fill', {letter: l, idx: i}); moveToNext(); }
            renderBank(); checkWin();
        }

        function handleBackspaceSync() { if(selectedIdx !== null) applyBack(selectedIdx, true); }
        function applyBack(i, notify) {
            const cell = document.getElementById(`cell-${i}`);
            if(!cell || cell.classList.contains('is-hint')) return;
            cell.innerText = "";
            if(notify) { send('back', {idx: i}); moveToPrev(); }
            renderBank();
        }

        function handleHintSync() {
            const empties = Array.from(document.querySelectorAll('.cell')).filter(c => c.className === 'cell' && c.innerText === "");
            if(!empties.length) return;
            const target = empties[Math.floor(Math.random() * empties.length)];
            const idx = parseInt(target.id.split('-')[1]);
            const char = currentQuote[idx];
            applyHint(idx, char); send('hint', {idx, char});
        }
        function applyHint(idx, char) { 
            const c = document.getElementById(`cell-${idx}`); 
            if(c) { c.innerText = char; c.classList.add('is-hint'); if(selectedIdx === idx) moveToNext(); }
            renderBank(); checkWin(); 
        }

        function handleSkipSync() { applySkip(true); }
        function applySkip(notify) {
            Array.from(document.querySelectorAll('.cell')).forEach(c => {
                const idx = parseInt(c.id.split('-')[1]);
                if(c.className === 'cell') { c.innerText = currentQuote[idx]; c.classList.add('is-hint'); }
            });
            if(notify) send('skip', {}); 
            showWinScreen();
        }

        function findNextPlayable(curr) {
            for(let i=curr+1; i<84; i++) {
                const c = document.getElementById(`cell-${i}`);
                if(c && c.className === 'cell' && !c.classList.contains('is-hint')) return i;
            }
            return null;
        }

        function findPrevPlayable(curr) {
            for(let i=curr-1; i>=0; i--) {
                const c = document.getElementById(`cell-${i}`);
                if(c && c.className === 'cell' && !c.classList.contains('is-hint')) return i;
            }
            return null;
        }

        function moveToNext() {
            let n = findNextPlayable(selectedIdx);
            if (n !== null) { applySelection(n); send('select', {idx: n}); }
        }

        function moveToPrev() {
            let n = findPrevPlayable(selectedIdx);
            if (n !== null) { applySelection(n); send('select', {idx: n}); }
        }

        function checkWin() {
            let s = "";
            for(let i=0; i<84; i++) {
                const c = document.getElementById(`cell-${i}`);
                if(!c) continue; 
                if(i >= currentQuote.length) break;
                if(c.classList.contains('black')) s += " ";
                else if(c.innerText === "") s += "?";
                else s += c.innerText;
            }
            if (s === currentQuote && currentQuote !== "") showWinScreen();
        }

        function showWinScreen() {
            document.getElementById('full-quote-text').innerText = `"${currentQuote}"`;
            document.getElementById('modal-author').innerText = `- ${currentAuthor}`;
            document.getElementById('modal-overlay').style.display = 'flex';
            saveToHistory();
        }

        function saveToHistory() {
            let history = JSON.parse(localStorage.getItem('dq_history_v3') || '[]');
            if(!history.find(h => h.id === currentQuoteId)) {
                history.push({id: currentQuoteId, date: new Date().toISOString()});
                localStorage.setItem('dq_history_v3', JSON.stringify(history));
            }
        }

        function requestNewGame() {
            document.getElementById('modal-overlay').style.display = 'none';
            if(isHost) pickInitialQuote(true); else send('new-request', {});
        }
    </script>
</body>
</html>
